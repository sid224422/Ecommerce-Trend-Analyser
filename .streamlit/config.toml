# TrendScanner AI — force readable light chrome (avoids dark click/focus surfaces)
[theme]
primaryColor = "#0284c7"
backgroundColor = "#f1f5f9"
secondaryBackgroundColor = "#ffffff"
textColor = "#0f172a"
font = "sans serif"

[server]
headless = true
address = "0.0.0.0"
port = 8501
enableCORS = false
enableXsrfProtection = false
# Docker: avoid host file-watcher churn inside containers
fileWatcherType = "none"
